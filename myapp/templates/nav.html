{% extends 'parent.html' %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}
        <title>Navbar</title>
    {% endblock %}
    
    {% block style %}
        <style>
            .nav-section{
                height: 55px;
                background-image: url("/static/images/navbar-background-1-b.jpg");
                background-size: cover;
                justify-content: space-between;
                padding-right: 25px;
            }
            
            .nav-section .logo{
                height: 55px;
            }
            .nav-section .logo-a{
                height: 55px;
                margin-right: 30px;
            }
            .nav-section a{
                color: #fff;
                font-size: 16px;
            }
            .nav-section select{
                height: 40px;
                width: 12vw;
                padding: 5px;
            }
            .nav-section .search-bar{
                height: 35px;
                width: 25vw;
                border: solid 0 black;
                padding-left: 15px;
            }
            .nav-section .search-bar-div{
                margin-inline: 30px 120px;
            }
            .nav-section .search-icon, .nav-section .search-button{
                height: 35px;
                width: 35px;
                border-left: solid 1px #bbb;
            }
            .nav-section .search-icon{
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .nav-section .profile-image{
                height: 40px;
                width: 40px;
                border-radius: 50%;
            }
        </style>
    {% endblock %}
</head>
<body>
    
    {% block content %}
        <nav class="nav-section flex">
            <a href="/" class="logo-a"><img src="{% static 'images/logo-7.png' %}" alt="Logo" class="logo"></a>

            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Kids</a>
            <a href="#">Professional</a>
            <a href="#">Rich</a>
            <a href="#">Wedding</a>
            <a href="#">Outfit</a>

            <div class="flex search-bar-div">
                <input type="search" id="search-bar" class="search-bar" placeholder="Search Items">
                <button class="search-button"><i class="fa-solid fa-magnifying-glass search-icon"></i></button>
            </div>
            
            {% if request.session.email %}
                <a href="#"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
                <a href="{% url 'logout' %}">Logout</a>
                <a href="#"><img src="{{request.session.profile_image}}" alt="Profile" class="profile-image"></a>
            {% else %}
                <a href="{% url 'signup' %}">Signup</a>
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </nav>
    {% endblock %}

</body>
</html>
