{% extends 'parent.html' %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}
        <title>Navbar</title>
    {% endblock %}
    
    {% block style %}
        <style>
            
        </style>
    {% endblock %}
</head>
<body>
    
    {% block content %}
        <nav class="nav-section flex">
            <a href="/" class="logo-a"><img src="{% static 'images/logo-1.png' %}" alt="Logo" class="logo"></a>

            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Kids</a>
            <a href="#">Professional</a>
            <a href="#">Rich</a>
            <a href="#">Wedding</a>
            <a href="#">Outfit</a>

            <div class="flex search-bar-div">
                <input type="search" id="search-bar" class="search-bar" placeholder="Search Items">
                <button class="search-button"><i class="fa-solid fa-magnifying-glass search-icon"></i></button>
            </div>
            
            {% if request.session.email %}
                <a href="#"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
                <a href="{% url 'logout' %}">Logout</a>
                <a href="#"><img src="{{request.session.profile_image}}" alt="Profile" class="profile-image"></a>
            {% else %}
                <a href="{% url 'signup' %}">Signup</a>
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </nav>
    {% endblock %}

</body>
</html>
