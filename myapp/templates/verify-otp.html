{% extends 'parent.html' %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}
        <title>Recover Accont</title>
    {% endblock %}
    {% block style %}
        <style>
            
        </style>
    {% endblock %}
</head>
<body>
    {% block content %}
        {% include 'nav.html' %}
        <div class="login-section">
            <form action="{% url 'verify-otp' %}" method="post" class="verify-otp-form">
                {% csrf_token %}
                <h2>Recover Account</h2>
                <div class="input-div">
                    <label for="otp">Enter OTP</label>
                    <input type="number" id="otp" name="otp">
                </div>
                
                <div class="input-div submit-button-div">
                    {% if error_message %}
                    <p class="error-message">{{error_message}}</p>
                    {% endif %}
                    <button type="submit" class="submit-button">Verify OTP</button>
                </div>

                <a href="{% url 'login' %}" class="create-new-acc-a">Back to Login</a>
            </form>
        </div>
    {% endblock %}
</body>
</html>
