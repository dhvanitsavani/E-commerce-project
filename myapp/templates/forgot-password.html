{% extends 'parent.html' %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}
        <title>Recover Account</title>
    {% endblock %}
    {% block style %}
        <style>

        </style>
    {% endblock %}
</head>
<body>
    {% block content %}
        {% include 'nav.html' %}
        <div class="login-section">
            <form action="{% url 'forgot-password' %}" method="post" class="forgot-password-form">
                {% csrf_token %}
                <h2>Recover Account</h2>
                <div class="input-div">
                    <label for="email">Enter Email address</label>
                    <input type="text" id="email" name="email">
                </div>
                
                <div class="input-div submit-button-div">
                    {% if error_message %}
                    <p class="error-message">{{error_message}}</p>
                    {% endif %}
                    <button type="submit" class="submit-button">Get OTP</button>
                </div>

                <a href="{% url 'login' %}" class="create-new-acc-a">Back to Login</a>
            </form>
        </div>
    {% endblock %}
</body>
</html>
